<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Digital Screen AI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
}

/* CONTENITORE CENTRALE */
.stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
}

/* BOX AVATAR RESPONSIVE */
.avatar-container {
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 420px; /* mobile perfetto */
  aspect-ratio: 9 / 16;
}

/* DESKTOP ADATTIVO */
@media (min-width: 768px) {
  .avatar-container {
    max-width: 520px;
  }
}

@media (min-width: 1200px) {
  .avatar-container {
    max-width: 600px;
  }
}

/* IFRAME */
iframe {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 20px;
  background: #000;
}
</style>
</head>

<body>

<div class="stage">
  <div class="avatar-container">

    <iframe 
      src="https://embed.liveavatar.com/v1/1ea75498-f68f-4d84-882c-e6347bc94c60?orientation=vertical"
      allow="microphone"
      title="Avatar LIA">
    </iframe>

  </div>
</div>

</body>
</html>
